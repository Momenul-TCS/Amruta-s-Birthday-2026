<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Amruta! 🎂</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f8ff; margin: 0; padding: 20px; }
    .card {
      max-width: 640px;
      margin: 60px auto;
      background: #fff;
      border-radius: 10px;
      padding: 40px 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { color: #2c3e50; font-size: 2em; margin-bottom: 10px; }
    .subtitle { color: #7f8c8d; font-size: 1.1em; margin-bottom: 30px; }
    p { color: #34495e; line-height: 1.6; }
    .cake { font-size: 4em; margin-bottom: 10px; }
    .play-btn {
      display: inline-block;
      background: #3498db;
      border: none;
      color: #fff;
      padding: 14px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.1em;
      text-decoration: none;
      margin-top: 20px;
      transition: background 0.2s;
    }
    .play-btn:hover { background: #2980b9; }
  </style>
</head>
<body>
  <div class="card">
    <div class="cake">🎂</div>
    <h1>Happy Birthday, Amruta!</h1>
    <p class="subtitle">Wishing you a wonderful year ahead filled with joy and happiness!</p>
    <p>A special birthday surprise awaits you — click below to play!</p>
    <a href="game1.html" class="play-btn">Play the Birthday Game</a>
  </div>
</body>
</html>
